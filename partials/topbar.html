<!-- ───────── Top bar ───────── -->
<header class="topbar">

  <!-- Favori proje tab'ları (sol) -->
  <div class="topbar-proj-tabs">
    <button class="topbar-proj-tab active" type="button"
            data-brand="kahve-dunyasi"
            data-page="project-detail"
            data-label="Markalar / Kahve Dünyası">
      <span class="tpt-dot" style="background:#7c5c3b;"></span>
      <span class="tpt-name">KD - Web</span>
      <span class="tpt-close" aria-label="Kapat">×</span>
    </button>
    <button class="topbar-proj-tab" type="button"
            data-brand="vodafone"
            data-page="project-detail"
            data-label="Markalar / Vodafone">
      <span class="tpt-dot" style="background:#e60000;"></span>
      <span class="tpt-name">A101 - Mobile App</span>
      <span class="tpt-close" aria-label="Kapat">×</span>
    </button>
    <button class="topbar-proj-tab" type="button"
            data-brand="turkcell"
            data-page="project-detail"
            data-label="Markalar / Turkcell">
      <span class="tpt-dot" style="background:#00a0e3;"></span>
      <span class="tpt-name">Turkcell</span>
      <span class="tpt-close" aria-label="Kapat">×</span>
    </button>
    <button class="tpt-add" type="button" title="Proje ekle">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>

  <span class="spacer"></span>
  <div class="topbar-actions">

    <!-- Timer (click to start/stop) -->
    <button class="timer" id="timerBtn" type="button" aria-pressed="false">
      <span class="play" id="timerPlay">
        <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6 4 20 12 6 20 6 4"/></svg>
      </span>
      <span class="lbl" id="timerLbl">Start tracking</span>
      <span class="clock" id="timerClock" style="display:none;">00:00:00</span>
      <span class="pulse" id="timerPulse" style="display:none;"></span>
    </button>

    <!-- Calendar -->
    <button class="cal-btn" id="calBtn" type="button">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span class="day">Apr 30</span>
      <span class="events-pill">3</span>
    </button>

  </div>
</header>

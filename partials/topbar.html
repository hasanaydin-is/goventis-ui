<!-- ───────── Top bar ───────── -->
<header class="topbar">
  <div class="tabs-strip" id="tabsStrip" role="tablist"></div>
  <button class="tab-add" id="tabAdd" title="New tab" type="button" aria-label="New tab">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
  </button>

  <span class="spacer"></span>

  <div class="topbar-actions">

    <!-- Timer (click to start/stop, click pencil row to expand) -->
    <button class="timer" id="timerBtn" type="button" aria-pressed="false">
      <span class="play" id="timerPlay">
        <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6 4 20 12 6 20 6 4"/></svg>
      </span>
      <span class="lbl" id="timerLbl">Start tracking</span>
      <span class="clock" id="timerClock" style="display:none;">00:00:00</span>
      <span class="pulse" id="timerPulse" style="display:none;"></span>
    </button>

    <!-- Calendar -->
    <button class="cal-btn" id="calBtn" type="button">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span class="day">Apr 29</span>
      <span class="events-pill">3</span>
    </button>

    <button class="icon-btn" title="More" type="button">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/>
      </svg>
    </button>
  </div>
</header>

<!-- ───────── AI Conversation Drawer ───────── -->
<aside class="ai-drawer" id="aiDrawer">
  <div class="chat-head">
    <span class="ai-orb"></span>
    <span class="title">AI Asistan</span>
    <span class="sub"><span class="live"></span>online · GPT-4o</span>
    <button class="ai-drawer-close" id="aiDrawerClose" title="Kapat" type="button">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <div class="chat-body" id="aiDrawerBody"></div>

  <div class="chat-input">
    <div class="input-shell">
      <textarea id="aiDrawerInput" placeholder="Mesaj yaz…" rows="1"></textarea>
      <div class="actions">
        <button class="ico-btn" title="Attach" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <button class="ico-btn" title="Slash command" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="19" y1="5" x2="5" y2="19"/></svg>
        </button>
        <span class="spacer"></span>
        <span style="font-size:11px;color:var(--muted-2);">⌘ + Enter</span>
        <button class="send" id="aiDrawerSend" type="button">
          Gönder
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
</aside>

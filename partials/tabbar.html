<!-- ───────── Window tabs (above sidebar + topbar) ───────── -->
<div class="tabbar">
  <div class="traffic" aria-hidden="true">
    <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
  </div>
  <div class="tabs-strip" id="tabsStrip" role="tablist"></div>
  <button class="tab-add" id="tabAdd" title="New tab" type="button" aria-label="New tab">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
  </button>
  <div class="tabs-spacer"></div>
</div>

<!-- Add-tab popover -->
<div class="add-pop" id="addPop" role="menu">
  <div class="ap-label">Open</div>
  <button class="ap-item" data-page="deck" data-label="Home / Deck" type="button">
    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
    Deck
  </button>
  <button class="ap-item" data-page="inbox" data-label="Tasks / Inbox" type="button">
    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11Z"/></svg></span>
    Inbox
  </button>
  <button class="ap-item" data-page="my-issues" data-label="Tasks / My Issues" type="button">
    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></span>
    My Issues
  </button>
  <button class="ap-item" data-page="projects" data-label="Tasks / Projects" type="button">
    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg></span>
    Projects
  </button>
  <button class="ap-item" data-page="workflows" data-label="Tasks / Workflows" type="button">
    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="5" height="5" rx="1"/><rect x="16" y="3" width="5" height="5" rx="1"/><rect x="16" y="16" width="5" height="5" rx="1"/><path d="M8 5.5h4a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H8"/><path d="M16 18.5H12"/></svg></span>
    Workflows
  </button>
  <button class="ap-item" data-page="skills" data-label="Tasks / Skills" type="button">
    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></span>
    Skills
  </button>
  <button class="ap-item" data-page="calendar" data-label="Tasks / Calendar" type="button">
    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
    Calendar
  </button>
  <button class="ap-item" data-page="add-ons" data-label="Tasks / Add-ons" type="button">
    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/><line x1="16" y1="8" x2="2" y2="22"/><line x1="17.5" y1="15" x2="9" y2="15"/></svg></span>
    Add-ons
  </button>
</div>

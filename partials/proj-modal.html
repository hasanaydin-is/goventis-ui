<style>
#parentProjModal {
  position: fixed;
  z-index: 510;
  top: 40px; bottom: 40px;
  left: 50%; transform: translateX(-50%) translateY(14px) scale(.98);
  width: min(820px, calc(100vw - 80px));
  background: var(--surface);
  border-radius: 16px;
  box-shadow: var(--shadow-modal);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity .18s ease, transform .18s ease;
}
#parentProjModal.open {
  opacity: 1;
  transform: translateX(-50%) translateY(0) scale(1);
  pointer-events: auto;
}
.pm-banner { height: 116px; flex-shrink: 0; position: relative; display: flex; align-items: flex-end; padding: 0 28px; }
.pm-logo-wrap { position: relative; margin-bottom: -22px; z-index: 1; }
.pm-logo { width: 60px; height: 60px; border-radius: 14px; border: 3px solid var(--surface); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; color: #fff; letter-spacing: -0.02em; user-select: none; }
.pm-close { position: absolute; top: 12px; right: 14px; width: 28px; height: 28px; border: none; background: rgba(0,0,0,.22); border-radius: 7px; color: rgba(255,255,255,.9); display: grid; place-items: center; cursor: pointer; transition: background .12s; }
.pm-close:hover { background: rgba(0,0,0,.38); }
.pm-close svg { width: 13px; height: 13px; }
.pm-head { padding: 30px 28px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 20px; flex-shrink: 0; }
.pm-info { flex: 1; }
.pm-name { font-size: 19px; font-weight: 700; letter-spacing: -0.02em; color: var(--fg); margin: 0 0 3px; }
.pm-type { font-size: 13px; color: var(--muted); }
.pm-chips { display: flex; gap: 7px; margin-top: 12px; flex-wrap: wrap; }
.pm-chip { display: inline-flex; align-items: center; gap: 5px; height: 25px; padding: 0 10px; border-radius: 999px; font-size: 12px; font-weight: 500; background: var(--surface-2); border: 1px solid var(--border); color: var(--fg-2); }
.pm-chip svg { width: 12px; height: 12px; color: var(--muted); }
.pm-meta-col { display: flex; flex-direction: column; gap: 7px; align-items: flex-end; flex-shrink: 0; padding-top: 2px; }
.pm-meta-row { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
.pm-meta-row strong { color: var(--fg-2); font-weight: 500; }
.pm-meta-row svg { width: 12px; height: 12px; flex-shrink: 0; }
.pm-tabs { display: flex; padding: 0 28px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.pm-tab { height: 42px; padding: 0 14px; background: none; border: none; border-bottom: 2px solid transparent; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; transition: color .12s, border-color .12s; margin-bottom: -1px; }
.pm-tab:hover { color: var(--fg); }
.pm-tab.active { color: var(--fg); border-bottom-color: var(--fg); }
.pm-content { flex: 1; overflow-y: auto; }
.pm-panel { display: none; padding: 24px 28px 40px; }
.pm-panel.active { display: block; }
.pm-section { margin-bottom: 26px; }
.pm-section-title { font-size: 10.5px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted-2); margin-bottom: 10px; }
.pm-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.pm-detail-item { border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; background: var(--surface-2); }
.pm-detail-item .k { font-size: 11px; color: var(--muted); margin-bottom: 4px; font-weight: 500; }
.pm-detail-item .v { font-size: 14px; font-weight: 600; color: var(--fg); font-variant-numeric: tabular-nums; }
.pm-detail-item .v.soft { font-weight: 400; color: var(--fg-2); font-size: 13px; }
.pm-sprint-track { margin-top: 12px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
.pm-sprint-label { display: flex; justify-content: space-between; font-size: 12.5px; color: var(--muted); margin-bottom: 8px; }
.pm-sprint-label strong { color: var(--fg-2); font-weight: 500; }
.pm-sprint-bar { height: 8px; border-radius: 4px; background: var(--border-2); overflow: hidden; }
.pm-sprint-bar > span { display: block; height: 100%; background: var(--accent); border-radius: 4px; transition: width .4s ease; }
.pm-sprint-foot { display: flex; justify-content: space-between; margin-top: 7px; font-size: 11.5px; color: var(--muted); font-variant-numeric: tabular-nums; }
.pm-issue-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border-2); font-size: 13px; }
.pm-issue-row:last-child { border-bottom: none; }
.pm-issue-id { font-family: var(--font-mono); font-size: 11.5px; color: var(--muted); min-width: 64px; font-variant-numeric: tabular-nums; }
.pm-issue-title { flex: 1; color: var(--fg); font-weight: 500; }
.pm-issue-status { font-size: 11.5px; padding: 2px 8px; border-radius: 999px; font-weight: 500; }
.pm-issue-status.todo { background: #f3f4f7; color: var(--muted); }
.pm-issue-status.prog { background: #fff8ed; color: var(--status-prog); }
.pm-issue-status.done { background: #edf9f3; color: var(--status-done); }
.pm-member-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border-2); }
.pm-member-row:last-child { border-bottom: none; }
.pm-member-av { width: 32px; height: 32px; border-radius: 50%; display: grid; place-items: center; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }
.pm-member-name { flex: 1; font-size: 13px; font-weight: 500; color: var(--fg); }
.pm-member-role { font-size: 11.5px; color: var(--muted); padding: 2px 9px; border-radius: 999px; background: var(--surface-2); border: 1px solid var(--border-2); }
</style>

<div id="parentProjModal" role="dialog" aria-modal="true" aria-label="Proje detayı">

  <div class="pm-banner" id="ppmBanner">
    <div class="pm-logo-wrap">
      <div class="pm-logo" id="ppmLogo"></div>
    </div>
    <button class="pm-close" id="ppmClose" aria-label="Kapat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>

  <div class="pm-head">
    <div class="pm-info">
      <h2 class="pm-name" id="ppmName"></h2>
      <div class="pm-type" id="ppmType"></div>
      <div class="pm-chips" id="ppmChips"></div>
    </div>
    <div class="pm-meta-col" id="ppmMeta"></div>
  </div>

  <div class="pm-tabs" id="ppmTabs">
    <button class="pm-tab active" data-tab="overview">Genel Bakış</button>
    <button class="pm-tab" data-tab="issues">Issues</button>
    <button class="pm-tab" data-tab="members">Üyeler</button>
  </div>

  <div class="pm-content">
    <div class="pm-panel active" id="ppm-tab-overview"></div>
    <div class="pm-panel" id="ppm-tab-issues"></div>
    <div class="pm-panel" id="ppm-tab-members"></div>
  </div>

</div>

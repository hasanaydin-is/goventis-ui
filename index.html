<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1440" />
  <title>Goventis — Workspace</title>

  <!-- Design tokens + shared styles -->
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/layout.css" />
  <link rel="stylesheet" href="styles/components.css" />
</head>
<body>

<!--
  Shell — sidebar (Linear-style) + topbar + iframe content host.
  Markup is split into partials/ and behavior into scripts/.
  scripts/main.js fetches partials at boot, then wires modules.
-->
<div class="app">

  <div data-partial="tabbar"></div>
  <div data-partial="sidebar"></div>
  <div data-partial="topbar"></div>
  <div data-partial="timer-popover"></div>
  <div data-partial="calendar-popover"></div>
  <div data-partial="ai-drawer"></div>

  <iframe
    id="contentFrame"
    class="main-frame"
    src="pages/deck.html"
    title="Active page"
  ></iframe>

</div>

<div data-partial="modal"></div>
<div data-partial="ai-prompt"></div>

<script type="module" src="scripts/main.js"></script>

</body>
</html>

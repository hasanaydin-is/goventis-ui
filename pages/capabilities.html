  <style>
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; background: var(--surface); }
    .main { height: 100%; overflow: hidden; display: flex; flex-direction: column; }

  <!-- Page header -->

</main>

<script>
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && window.parent && window.parent !== window) {
      window.parent.postMessage({ type: 'closeIssue' }, '*');
    }
  });
</script>

</body>

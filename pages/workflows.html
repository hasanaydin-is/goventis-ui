<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1200" />
  <title>Goventis - Workflows</title>

  <link rel="stylesheet" href="../styles/tokens.css" />
  <link rel="stylesheet" href="../styles/base.css" />
  <link rel="stylesheet" href="../styles/layout.css" />
  <link rel="stylesheet" href="../styles/components.css" />

  <style>
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; background: var(--surface); }
    .main { height: 100%; overflow: hidden; display: flex; flex-direction: column; }

    /* ── List layout ── */
    .group-dot.wf-icon {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      border: none;
      display: grid;
      place-items: center;
      color: var(--muted);
      background: transparent;
    }
    .group-dot.wf-icon svg { width: 13px; height: 13px; }

    /* ── Workflow row ── */
    .wf-row {
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr) auto;
      align-items: center;
      gap: 0;
      height: 52px;
      padding: 0 40px 0 0;
      border-bottom: 1px solid var(--border-2);
      cursor: pointer;
      transition: background .1s;
    }
    .wf-row:last-child { border-bottom: none; }
    .wf-row:hover { background: var(--surface-2); }
    .wf-row:hover .wf-row-actions { opacity: 1; }
    .wf-row-icon-col {
      width: 40px;
      height: 52px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }
    .wf-row-icon {
      width: 26px;
      height: 26px;
      border-radius: 7px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      color: var(--muted);
      flex-shrink: 0;
    }
    .wf-row-icon svg { width: 13px; height: 13px; }
    .wf-row-main {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 0 0 8px;
    }
    .wf-row-copy { min-width: 0; flex: 1; }
    .wf-row-name {
      font-size: 13.5px;
      font-weight: 500;
      color: var(--fg);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -0.01em;
    }
    .wf-row-desc {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }
    .wf-row-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .wf-row-actions {
      display: flex;
      align-items: center;
      gap: 2px;
      opacity: 0;
      transition: opacity .1s;
      flex-shrink: 0;
      position: relative;
      padding-left: 8px;
    }

    /* Step count pill */
    .step-pill {
      height: 20px;
      padding: 0 7px;
      border-radius: 5px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    .step-pill svg { width: 10px; height: 10px; }

    /* System badge */
    .sys-badge {
      height: 18px;
      padding: 0 6px;
      border-radius: 4px;
      background: var(--accent-2);
      color: var(--accent);
      border: 1px solid var(--accent-3);
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    /* AI badge */
    .ai-pill {
      height: 18px;
      padding: 0 6px;
      border-radius: 4px;
      background: #f5f0ff;
      color: #7c5ddc;
      border: 1px solid #e5d9ff;
      font-size: 10.5px;
      font-weight: 600;
    }

    /* Row icon btn */
    .row-icon-btn {
      width: 28px;
      height: 28px;
      border: 1px solid transparent;
      background: transparent;
      border-radius: var(--radius-sm);
      color: var(--muted);
      display: grid;
      place-items: center;
      cursor: pointer;
      flex-shrink: 0;
    }
    .row-icon-btn:hover {
      background: var(--hover);
      border-color: var(--border);
      color: var(--fg);
    }
    .row-icon-btn svg { width: 14px; height: 14px; }

    /* Dropdown menu */
    .row-menu {
      position: absolute;
      z-index: 8;
      top: 32px;
      right: 0;
      min-width: 148px;
      padding: 4px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: var(--surface);
      box-shadow: 0 4px 16px rgba(13,17,23,.1), 0 1px 3px rgba(13,17,23,.06);
      display: none;
    }
    .row-menu.open { display: block; }
    .row-menu-item {
      width: 100%;
      height: 30px;
      border: none;
      background: transparent;
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 8px;
      color: var(--fg-2);
      font-size: 12.5px;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
    }
    .row-menu-item:hover { background: var(--hover); }
    .row-menu-item.danger:hover { background: #fff5f5; color: #c0392b; }
    .row-menu-sep {
      height: 1px;
      background: var(--border-2);
      margin: 3px 4px;
    }

    /* ── Empty state ── */
    .wf-empty {
      display: grid;
      place-items: center;
      padding: 80px 40px;
    }
    .wf-empty-inner {
      text-align: center;
      max-width: 280px;
    }
    .wf-empty-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      color: var(--muted);
      margin: 0 auto 14px;
    }
    .wf-empty-icon svg { width: 20px; height: 20px; }
    .wf-empty-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--fg);
      margin-bottom: 6px;
    }
    .wf-empty-sub {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    /* ══════════════════════════════════════════
       WF MODAL — create/edit
    ══════════════════════════════════════════ */
    .wf-modal {
      position: fixed;
      z-index: 52;
      top: 48px;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%) translateY(12px) scale(.985);
      width: min(980px, calc(100vw - 80px));
      background: var(--surface);
      border-radius: 14px;
      box-shadow: var(--shadow-modal);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity .16s ease, transform .16s ease;
    }
    .wf-modal.open {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0) scale(1);
    }

    /* Modal header */
    .wfm-head {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px 0 20px;
      height: 52px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .wfm-stepper {
      display: flex;
      align-items: center;
      gap: 0;
      flex: 1;
    }
    .wfm-step {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      height: 52px;
      padding: 0 14px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      white-space: nowrap;
    }
    .wfm-step.active {
      color: var(--fg);
      border-bottom-color: var(--fg);
    }
    .wfm-step.done { color: var(--fg-2); }
    .wfm-step-num {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      font-size: 10px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }
    .wfm-step.active .wfm-step-num {
      background: var(--fg);
      border-color: var(--fg);
      color: #fff;
    }
    .wfm-step.done .wfm-step-num {
      background: var(--status-done);
      border-color: var(--status-done);
      color: #fff;
    }
    .wfm-sep {
      width: 20px;
      height: 1px;
      background: var(--border);
      flex-shrink: 0;
    }
    .wfm-title-block { min-width: 0; }
    .wfm-title {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--fg);
    }
    .wfm-close {
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      border-radius: 6px;
      color: var(--muted);
      display: grid;
      place-items: center;
      cursor: pointer;
      flex-shrink: 0;
    }
    .wfm-close:hover { background: var(--hover); color: var(--fg); }
    .wfm-close svg { width: 14px; height: 14px; }

    /* Modal body panels */
    .wfm-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .wfm-panel { display: none; flex: 1; overflow: auto; }
    .wfm-panel.active { display: flex; flex-direction: column; }

    /* ── Panel 1: Name + Template ── */
    .wfm-p1-layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      flex: 1;
      overflow: hidden;
    }
    .wfm-sidebar {
      border-right: 1px solid var(--border);
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow-y: auto;
    }
    .wfm-sidebar-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 0 2px;
    }
    .form-row {
      display: grid;
      gap: 6px;
    }
    .form-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--fg-2);
    }
    .form-input,
    .form-textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--fg);
      font: inherit;
      font-size: 13px;
      outline: none;
      transition: border-color .12s, box-shadow .12s;
    }
    .form-input { height: 32px; padding: 0 10px; }
    .form-textarea {
      min-height: 110px;
      resize: vertical;
      padding: 8px 10px;
      line-height: 1.45;
    }
    .form-input:focus,
    .form-textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-2);
    }
    .form-input::placeholder,
    .form-textarea::placeholder { color: var(--muted-2); }

    /* Template list */
    .wfm-template-area {
      flex: 1;
      overflow-y: auto;
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .wfm-template-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .tmpl-list { display: grid; gap: 6px; }
    .tmpl-option { display: flex; }
    .tmpl-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }
    .tmpl-row {
      width: 100%;
      display: grid;
      grid-template-columns: 32px minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      transition: border-color .1s, background .1s;
    }
    .tmpl-option input:checked + .tmpl-row {
      border-color: var(--accent);
      background: var(--accent-2);
    }
    .tmpl-icon {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      color: var(--muted);
      flex-shrink: 0;
    }
    .tmpl-icon svg { width: 14px; height: 14px; }
    .tmpl-option input:checked + .tmpl-row .tmpl-icon {
      background: #fff;
      border-color: var(--accent-3);
      color: var(--accent);
    }
    .tmpl-copy { min-width: 0; }
    .tmpl-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--fg);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tmpl-desc {
      font-size: 11.5px;
      color: var(--muted);
      margin-top: 2px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .tmpl-row-right {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }
    .tmpl-chevron-btn {
      width: 22px;
      height: 22px;
      border: 1px solid transparent;
      background: transparent;
      border-radius: 5px;
      color: var(--muted);
      display: grid;
      place-items: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .1s, color .1s;
    }
    .tmpl-chevron-btn:hover { background: var(--hover); color: var(--fg-2); }
    .tmpl-chevron-btn svg { width: 12px; height: 12px; transition: transform .15s; }
    .tmpl-chevron-btn.open svg { transform: rotate(180deg); }
    .tmpl-wrap.acc-open .tmpl-row {
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .tmpl-accordion {
      max-height: 0;
      overflow: hidden;
      transition: max-height .22s ease;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      border-radius: 0 0 var(--radius) var(--radius);
      background: var(--surface-2);
    }
    .tmpl-wrap.acc-open .tmpl-option input:checked ~ .tmpl-accordion {
      border-color: var(--accent);
    }
    .tmpl-accordion.open { max-height: 400px; }
    .tmpl-acc-inner {
      padding: 8px 10px 10px;
      display: grid;
      gap: 5px;
    }
    .tmpl-acc-step {
      display: grid;
      grid-template-columns: 20px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
      padding: 7px 9px;
      border-radius: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .tmpl-acc-num {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      display: grid; place-items: center;
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .tmpl-acc-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--fg);
      margin-bottom: 2px;
    }
    .tmpl-acc-desc {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
    }
    .tmpl-custom-row {
      border-style: dashed;
      border-width: 2px;
      background: var(--surface-2);
    }
    .tmpl-option input:checked + .tmpl-custom-row {
      border-color: var(--accent);
      background: var(--accent-2);
      border-style: solid;
    }

    /* ── Panel 2: Builder ── */
    .wfm-p2-layout {
      display: grid;
      grid-template-columns: minmax(260px, .9fr) minmax(420px, 1.1fr);
      flex: 1;
      overflow: hidden;
    }
    .wfm-parts-col {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .wfm-col-head {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .wfm-col-title {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--fg);
    }
    .wfm-col-sub {
      font-size: 11.5px;
      color: var(--muted);
      margin-top: 2px;
    }
    .wfm-parts-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      display: grid;
      gap: 5px;
    }
    .part-item {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr) 28px;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: grab;
      transition: background .1s, border-color .1s;
    }
    .part-item:active { cursor: grabbing; }
    .part-item:hover { background: var(--surface-2); border-color: #d0d4db; }
    .part-drag-handle {
      width: 22px;
      height: 22px;
      display: grid;
      place-items: center;
      color: var(--muted-2);
      border-radius: 5px;
    }
    .part-drag-handle svg { width: 12px; height: 12px; }
    .part-item-copy { min-width: 0; }
    .part-item-name {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--fg);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .part-item-desc {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .part-info-btn {
      width: 26px;
      height: 26px;
      border: 1px solid transparent;
      background: transparent;
      border-radius: 5px;
      color: var(--muted-2);
      display: grid;
      place-items: center;
      cursor: pointer;
      position: relative;
    }
    .part-info-btn:hover { background: var(--hover); color: var(--fg); border-color: var(--border); }
    .part-info-btn svg { width: 12px; height: 12px; }
    .part-info-btn::after {
      content: attr(data-tooltip);
      position: absolute;
      z-index: 10;
      right: 0;
      top: calc(100% + 6px);
      width: 220px;
      padding: 8px 10px;
      border-radius: 8px;
      background: #1c2130;
      color: #fff;
      font-size: 11.5px;
      font-weight: 400;
      line-height: 1.45;
      text-align: left;
      box-shadow: 0 8px 24px rgba(13,17,23,.2);
      opacity: 0;
      pointer-events: none;
      transform: translateY(-3px);
      transition: opacity .12s, transform .12s;
      white-space: normal;
    }
    .part-info-btn:hover::after { opacity: 1; transform: translateY(0); }

    /* Canvas */
    .wfm-canvas-col {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--surface-2);
    }
    .wfm-canvas-head {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      background: var(--surface);
    }
    .canvas-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .canvas-drop-zone {
      flex: 1;
      min-height: 240px;
      border: 1.5px dashed var(--border);
      border-radius: var(--radius-lg);
      background: var(--surface);
      display: grid;
      gap: 6px;
      align-content: start;
      padding: 10px;
      transition: border-color .12s, background .12s;
    }
    .canvas-drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-2);
    }
    .canvas-empty-state {
      grid-column: 1 / -1;
      height: 140px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.5;
    }
    .canvas-step-item {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      min-height: 44px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 8px 10px;
      transition: opacity .12s;
    }
    .canvas-step-item.dragging { opacity: .45; }
    .canvas-step-num {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 10.5px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }
    .canvas-step-name {
      font-size: 12.5px;
      font-weight: 500;
      color: var(--fg);
      line-height: 1.35;
    }
    .canvas-step-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .canvas-remove-btn {
      width: 24px;
      height: 24px;
      border: 1px solid transparent;
      background: transparent;
      border-radius: 5px;
      color: var(--muted-2);
      display: grid;
      place-items: center;
      cursor: pointer;
    }
    .canvas-remove-btn:hover { background: #fff5f5; border-color: #fdd; color: #c0392b; }
    .canvas-remove-btn svg { width: 12px; height: 12px; }

    /* AI badge in canvas */
    .ai-step-badge {
      height: 18px;
      padding: 0 6px;
      border-radius: 4px;
      background: #f5f0ff;
      color: #7c5ddc;
      border: 1px solid #e5d9ff;
      font-size: 10px;
      font-weight: 600;
      white-space: nowrap;
    }


    /* Modal footer */
    .wfm-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--surface);
    }
    .wfm-footer-right { display: flex; align-items: center; gap: 6px; }

    /* ══════════════════════════════════════════
       WF DETAIL MODAL
    ══════════════════════════════════════════ */
    .wf-detail-modal {
      position: fixed;
      z-index: 52;
      top: 48px;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%) translateY(12px) scale(.985);
      width: min(680px, calc(100vw - 80px));
      background: var(--surface);
      border-radius: 14px;
      box-shadow: var(--shadow-modal);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity .16s ease, transform .16s ease;
    }
    .wf-detail-modal.open {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0) scale(1);
    }
    .wfd-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .wfd-head-left {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      min-width: 0;
    }
    .wfd-modal-icon {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      color: var(--muted);
      flex-shrink: 0;
    }
    .wfd-modal-icon svg { width: 17px; height: 17px; }
    .wfd-modal-copy { min-width: 0; }
    .wfd-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--fg);
      letter-spacing: -0.02em;
      margin: 0 0 4px;
    }
    .wfd-meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .wfd-close {
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      border-radius: 6px;
      color: var(--muted);
      display: grid;
      place-items: center;
      cursor: pointer;
      flex-shrink: 0;
    }
    .wfd-close:hover { background: var(--hover); color: var(--fg); }
    .wfd-close svg { width: 14px; height: 14px; }

    .wfd-desc-section {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .wfd-desc {
      font-size: 13px;
      color: var(--fg-2);
      line-height: 1.6;
      margin: 0;
    }

    .wfd-steps-section {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }
    .wfd-steps-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .wfd-steps-list { display: grid; gap: 6px; }
    .wfd-step {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }
    .wfd-step-num {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }
    .wfd-step-copy { min-width: 0; }
    .wfd-step-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--fg);
      margin-bottom: 2px;
    }
    .wfd-step-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }

    .wfd-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<main class="main">

  <!-- Page header -->
  <div class="page-head">
    <div>
      <div class="page-title-row">
        <h1 class="page-title">Workflows</h1>
        <span class="page-count" id="wfCountBadge">0 workflow</span>
      </div>
      <div class="page-sub">Proje oluştururken seçilecek workflow akışlarını yönet.</div>
    </div>
    <div class="page-actions">
      <button class="btn btn-primary" type="button" id="newWorkflowBtn">
        <span class="ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        </span>
        Yeni workflow
      </button>
    </div>
  </div>

  <!-- Filter row -->
  <div class="filter-row">
    <input class="search" type="search" placeholder="Workflow ara…" id="wfSearch" />
    <span class="spacer"></span>
  </div>

  <!-- List -->
  <div class="list-wrap" id="wfListWrap"></div>

</main>

<!-- Scrim -->
<div class="scrim" id="scrim"></div>

<!-- ══════════ CREATE / EDIT MODAL ══════════ -->
<div class="wf-modal" id="wfModal" role="dialog" aria-modal="true">

  <div class="wfm-head">
    <div class="wfm-stepper">
      <div class="wfm-step active" id="stepTab1">
        <span class="wfm-step-num">1</span>
        Template seç
      </div>
      <div class="wfm-sep"></div>
      <div class="wfm-step" id="stepTab2">
        <span class="wfm-step-num">2</span>
        Oluştur
      </div>
    </div>
    <button class="wfm-close" type="button" id="wfModalClose" aria-label="Kapat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>

  <div class="wfm-body">

    <!-- Panel 1 -->
    <section class="wfm-panel active" id="wfPanel1">
      <div class="wfm-p1-layout">

        <div class="wfm-sidebar">
          <p class="wfm-sidebar-title">Detaylar</p>
          <label class="form-row">
            <span class="form-label">Workflow adı</span>
            <input class="form-input" id="wfName" type="text" placeholder="Ör: Sprint Hazırlık Akışı" />
          </label>
          <label class="form-row">
            <span class="form-label">Açıklama</span>
            <textarea class="form-textarea" id="wfDesc" placeholder="Bu workflow ne için kullanılır?"></textarea>
          </label>
        </div>

        <div class="wfm-template-area">
          <p class="wfm-template-label">Bir template seç</p>
          <div class="tmpl-list" id="tmplList"></div>
        </div>

      </div>
    </section>

    <!-- Panel 2 -->
    <section class="wfm-panel" id="wfPanel2">
      <div class="wfm-p2-layout">

        <div class="wfm-parts-col">
          <div class="wfm-col-head">
            <p class="wfm-col-title">Kullanılabilir adımlar</p>
            <p class="wfm-col-sub">Canvas alanına sürükle veya tıkla.</p>
          </div>
          <div class="wfm-parts-list" id="wfPartList"></div>
        </div>

        <div class="wfm-canvas-col">
          <div class="wfm-canvas-head">
            <div>
              <p class="wfm-col-title">Workflow akışı</p>
              <p class="wfm-col-sub">Sırala, düzenle, istemediklerini çıkar.</p>
            </div>
            <span class="step-pill" id="canvasCount">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
              0 adım
            </span>
          </div>
          <div class="canvas-wrap">
            <div class="canvas-drop-zone" id="wfCanvas"></div>
          </div>
        </div>

      </div>
    </section>

  </div>

  <div class="wfm-footer">
    <button class="btn" type="button" id="wfBackBtn" style="visibility:hidden;">Geri</button>
    <div class="wfm-footer-right">
      <button class="btn" type="button" id="wfCancelBtn">Vazgeç</button>
      <button class="btn btn-primary" type="button" id="wfNextBtn">Devam et</button>
      <button class="btn btn-primary" type="button" id="wfSaveBtn" style="display:none;">
        <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></span>
        Oluştur
      </button>
    </div>
  </div>

</div>

<!-- ══════════ DETAIL MODAL ══════════ -->
<div class="wf-detail-modal" id="wfDetailModal" role="dialog" aria-modal="true">
  <div class="wfd-head">
    <div class="wfd-head-left">
      <div class="wfd-modal-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="2"/><circle cx="18" cy="6" r="2"/><circle cx="12" cy="18" r="2"/><path d="M8 6h8M7 8l4 8M17 8l-4 8"/></svg>
      </div>
      <div class="wfd-modal-copy">
        <h2 class="wfd-title" id="wfdTitle"></h2>
        <div class="wfd-meta-row" id="wfdMeta"></div>
      </div>
    </div>
    <button class="wfd-close" type="button" id="wfDetailClose">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="wfd-desc-section">
    <p class="wfd-desc" id="wfdDesc"></p>
  </div>
  <div class="wfd-steps-section">
    <p class="wfd-steps-title">Adımlar</p>
    <div class="wfd-steps-list" id="wfdSteps"></div>
  </div>
  <div class="wfd-footer">
    <button class="btn" type="button" id="wfDetailClose2">Kapat</button>
  </div>
</div>

<script>
const SVG = {
  workflow: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="2"/><circle cx="18" cy="6" r="2"/><circle cx="12" cy="18" r="2"/><path d="M8 6h8M7 8l4 8M17 8l-4 8"/></svg>`,
  plus: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>`,
  drag: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 6h.01M15 6h.01M9 12h.01M15 12h.01M9 18h.01M15 18h.01"/></svg>`,
  minus: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M5 12h14"/></svg>`,
  info: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 8h.01"/></svg>`,
  more: `<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>`,
  lock: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`,
};

const PARTS = [
  { id: 'scope',    name: 'RFP / Kapsam',               desc: 'RFP, hedef, teslim kapsamı ve başarı kriterleri netleştirilir.' },
  { id: 'analysis', name: 'Analiz',                     desc: 'İş ihtiyacı, teknik bağımlılıklar, veri akışları ve riskli noktalar çıkarılır.' },
  { id: 'wbs',      name: 'WBS / İş adam günü',         desc: 'İş kırılım yapısı hazırlanır ve her kırılıma tahmini efor atanır.' },
  { id: 'sprints',  name: 'Sprint planlaması',           desc: 'Sprint sayısı, tarih aralıkları ve teslim hedefleri planlanır.' },
  { id: 'tasks',    name: 'Task oluşturma',              desc: 'Her sprint için yapılacak taskler, kapsam ve kabul kriterleriyle oluşturulur.' },
  { id: 'risks',    name: 'Risk & bağımlılık kontrolü', desc: 'Blokerlar, dış ekip bağımlılıkları ve çözülmesi gereken varsayımlar takip edilir.' },
  { id: 'qa',       name: 'UAT / QA planı',             desc: 'Test kapsamı, kabul kriterleri ve UAT sorumlulukları planlanır.' },
  { id: 'release',  name: 'Release & handoff',          desc: 'Yayın hazırlığı, teslim notları ve operasyon devri tamamlanır.' },
];

const DEFAULT_WORKFLOWS = [
  {
    id: 'discoverySprint',
    name: 'Discovery to Sprint Delivery',
    desc: 'RFP kapsamından sprint tasklerine kadar standart proje başlangıç akışı.',
    steps: ['scope', 'analysis', 'wbs', 'sprints', 'tasks'],
    firstStepAi: false,
  },
  {
    id: 'enterpriseAnalysis',
    name: 'Enterprise Analysis',
    desc: 'Kurumsal projelerde kapsam, paydaş ve teknik çözüm hizalaması.',
    steps: ['scope', 'analysis', 'risks', 'wbs', 'sprints'],
    firstStepAi: false,
  },
  {
    id: 'releaseReadiness',
    name: 'Release Readiness',
    desc: 'QA, risk kontrolü ve release teslim hazırlığı için kısa akış.',
    steps: ['qa', 'risks', 'release'],
    firstStepAi: false,
  },
  {
    id: 'designSystem',
    name: 'Design System Build',
    desc: 'Token, component set, dokümantasyon ve release adımlarını yöneten tasarım sistemi akışı.',
    steps: ['analysis', 'wbs', 'qa', 'release'],
    firstStepAi: false,
  },
];

let selectedTemplate = 'discoverySprint';
let modalStep = 1;
let builderSteps = [];
let draggingPartId = null;
let draggingStepIdx = null;
let searchQuery = '';

function esc(v) {
  return String(v)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function getPart(id) { return PARTS.find(p => p.id === id) || PARTS[0]; }

function getStoredWorkflows() {
  try { return JSON.parse(localStorage.getItem('goventisWorkflows') || '[]'); } catch { return []; }
}
function saveStoredWorkflows(wfs) {
  localStorage.setItem('goventisWorkflows', JSON.stringify(wfs));
}
function allWorkflows() {
  return [
    ...DEFAULT_WORKFLOWS.map(w => ({ ...w, system: true })),
    ...getStoredWorkflows().map(w => ({ ...w, system: false })),
  ];
}

/* ── Render list ── */
function renderList() {
  const wrap = document.getElementById('wfListWrap');
  const q = searchQuery.toLowerCase();
  let wfs = allWorkflows();
  if (q) wfs = wfs.filter(w => w.name.toLowerCase().includes(q) || w.desc.toLowerCase().includes(q));

  const total = wfs.length;
  document.getElementById('wfCountBadge').textContent = `${total} workflow`;

  if (!total) {
    wrap.innerHTML = `
      <div class="wf-empty">
        <div class="wf-empty-inner">
          <div class="wf-empty-icon">${SVG.workflow}</div>
          <p class="wf-empty-title">${searchQuery ? 'Sonuç bulunamadı' : 'Henüz workflow yok'}</p>
          <p class="wf-empty-sub">${searchQuery ? 'Farklı bir arama terimi deneyin.' : 'İlk workflow\'u oluşturmak için "Yeni workflow" butonuna tıkla.'}</p>
        </div>
      </div>`;
    return;
  }

  const system = wfs.filter(w => w.system);
  const custom = wfs.filter(w => !w.system);

  let html = '';
  if (system.length) {
    html += `
      <section class="group">
        <header class="group-head">
          <span class="group-dot wf-icon">${SVG.lock}</span>
          <span class="group-name">Sistem</span>
          <span class="group-count">${system.length}</span>
        </header>
        ${system.map(rowHtml).join('')}
      </section>`;
  }
  if (custom.length) {
    html += `
      <section class="group">
        <header class="group-head">
          <span class="group-dot wf-icon">${SVG.workflow}</span>
          <span class="group-name">Özel</span>
          <span class="group-count">${custom.length}</span>
        </header>
        ${custom.map(rowHtml).join('')}
      </section>`;
  }
  wrap.innerHTML = html;
}

function rowHtml(w) {
  const stepCount = w.steps.length;
  const hasAi = stepCount > 0;
  return `
    <div class="wf-row" data-wf-id="${esc(w.id)}" tabindex="0" role="button">
      <div class="wf-row-icon-col">
        <span class="wf-row-icon">${SVG.workflow}</span>
      </div>
      <div class="wf-row-main">
        <div class="wf-row-copy">
          <div class="wf-row-name">${esc(w.name)}</div>
          <div class="wf-row-desc">${esc(w.desc)}</div>
        </div>
      </div>
      <div class="wf-row-meta">
        ${w.system ? `<span class="sys-badge">Sistem</span>` : ''}
        ${hasAi ? `<span class="ai-pill">AI</span>` : ''}
        <span class="step-pill">${stepCount} adım</span>
        <div class="wf-row-actions" id="actions-${esc(w.id)}">
          ${w.system ? '' : `
            <button class="row-icon-btn" type="button" data-menu-for="${esc(w.id)}" aria-label="Menü">${SVG.more}</button>
            <div class="row-menu" data-menu-id="${esc(w.id)}">
              <button class="row-menu-item danger" type="button" data-delete="${esc(w.id)}">Sil</button>
            </div>
          `}
        </div>
      </div>
    </div>`;
}

/* ── Detail modal ── */
function openDetail(wfId) {
  const w = allWorkflows().find(x => x.id === wfId);
  if (!w) return;
  const steps = w.steps.map(getPart);
  document.getElementById('wfdTitle').textContent = w.name;
  document.getElementById('wfdDesc').textContent = w.desc;
  document.getElementById('wfdMeta').innerHTML = `
    <span class="step-pill">${steps.length} adım</span>
    ${w.system ? `<span class="sys-badge">Sistem</span>` : ''}
  `;
  document.getElementById('wfdSteps').innerHTML = steps.map((s, i) => {
    return `
      <div class="wfd-step">
        <span class="wfd-step-num">${i + 1}</span>
        <div class="wfd-step-copy">
          <div class="wfd-step-name">${esc(s.name)}</div>
          <div class="wfd-step-desc">${esc(s.desc)}</div>
        </div>
        <span class="ai-step-badge">AI review</span>
      </div>`;
  }).join('');
  openScrim();
  document.getElementById('wfDetailModal').classList.add('open');
  postModal(true);
}

/* ── Create modal ── */
function openCreateModal() {
  selectedTemplate = 'discoverySprint';
  builderSteps = [];
  renderTemplates();
  renderParts();
  applyTemplate();
  setModalStep(1);
  openScrim();
  document.getElementById('wfModal').classList.add('open');
  postModal(true);
}

function setModalStep(step) {
  modalStep = step;
  document.getElementById('wfPanel1').classList.toggle('active', step === 1);
  document.getElementById('wfPanel2').classList.toggle('active', step === 2);
  document.getElementById('stepTab1').classList.toggle('active', step === 1);
  document.getElementById('stepTab1').classList.toggle('done', step === 2);
  document.getElementById('stepTab2').classList.toggle('active', step === 2);
  document.getElementById('wfBackBtn').style.visibility = step === 2 ? 'visible' : 'hidden';
  document.getElementById('wfNextBtn').style.display = step === 1 ? '' : 'none';
  document.getElementById('wfSaveBtn').style.display = step === 2 ? '' : 'none';
}

function applyTemplate() {
  if (selectedTemplate === 'custom') {
    builderSteps = [];
    document.getElementById('wfName').value = '';
    document.getElementById('wfDesc').value = '';
  } else {
    const t = DEFAULT_WORKFLOWS.find(x => x.id === selectedTemplate) || DEFAULT_WORKFLOWS[0];
    builderSteps = [...t.steps];
    document.getElementById('wfName').value = t.name;
    document.getElementById('wfDesc').value = t.desc;
  }
  renderCanvas();
}

function renderTemplates() {
  const list = document.getElementById('tmplList');
  list.innerHTML = DEFAULT_WORKFLOWS.map(t => {
    const steps = t.steps.map(getPart);
    return `
      <div class="tmpl-wrap" data-tmpl-id="${t.id}">
        <label class="tmpl-option">
          <input type="radio" name="tmpl" value="${t.id}" ${selectedTemplate === t.id ? 'checked' : ''} />
          <span class="tmpl-row">
            <span class="tmpl-icon">${SVG.workflow}</span>
            <span class="tmpl-copy">
              <span class="tmpl-name">${esc(t.name)}</span>
              <span class="tmpl-desc">${esc(t.desc)}</span>
            </span>
            <span class="tmpl-row-right">
              <span class="step-pill">${steps.length} adım</span>
              <button class="tmpl-chevron-btn" type="button" data-expand="${t.id}" aria-label="Adımları göster">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
              </button>
            </span>
          </span>
        </label>
        <div class="tmpl-accordion" id="acc-${t.id}">
          <div class="tmpl-acc-inner">
            ${steps.map((s, i) => `
              <div class="tmpl-acc-step">
                <span class="tmpl-acc-num">${i + 1}</span>
                <span>
                  <div class="tmpl-acc-name">${esc(s.name)}</div>
                  <div class="tmpl-acc-desc">${esc(s.desc)}</div>
                </span>
              </div>`).join('')}
          </div>
        </div>
      </div>`;
  }).join('') + `
    <label class="tmpl-option">
      <input type="radio" name="tmpl" value="custom" ${selectedTemplate === 'custom' ? 'checked' : ''} />
      <span class="tmpl-row tmpl-custom-row">
        <span class="tmpl-icon">${SVG.plus}</span>
        <span class="tmpl-copy">
          <span class="tmpl-name">Boş canvas</span>
          <span class="tmpl-desc">Sıfırdan oluştur, istediğin adımları sürükle.</span>
        </span>
      </span>
    </label>`;
}

function renderParts() {
  document.getElementById('wfPartList').innerHTML = PARTS.map(p => `
    <div class="part-item" draggable="true" data-part-id="${p.id}">
      <span class="part-drag-handle">${SVG.drag}</span>
      <span class="part-item-copy">
        <span class="part-item-name">${esc(p.name)}</span>
        <span class="part-item-desc">${esc(p.desc)}</span>
      </span>
      <button class="part-info-btn" type="button" data-tooltip="${esc(p.desc)}" aria-label="Detay">${SVG.info}</button>
    </div>`).join('');
}

function renderCanvas() {
  const canvas = document.getElementById('wfCanvas');
  document.getElementById('canvasCount').innerHTML = `
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    ${builderSteps.length} adım`;

  if (!builderSteps.length) {
    canvas.innerHTML = `<div class="canvas-empty-state">Sol taraftaki adımları buraya sürükle<br>veya tıklayarak ekle.</div>`;
    return;
  }

  canvas.innerHTML = builderSteps.map((partId, i) => {
    const p = getPart(partId);
    return `
      <div class="canvas-step-item" draggable="true" data-step-index="${i}">
        <span class="canvas-step-num">${i + 1}</span>
        <span class="canvas-step-name">${esc(p.name)}</span>
        <div class="canvas-step-actions">
          <span class="ai-step-badge">AI</span>
          <button class="canvas-remove-btn" type="button" data-remove="${i}" aria-label="Çıkar">${SVG.minus}</button>
        </div>
      </div>`;
  }).join('');
}

function closeModal() {
  document.getElementById('wfModal').classList.remove('open');
  document.getElementById('wfDetailModal').classList.remove('open');
  closeScrim();
  postModal(false);
}

function openScrim() { document.getElementById('scrim').classList.add('open'); }
function closeScrim() { document.getElementById('scrim').classList.remove('open'); }
function postModal(open) {
  if (window.parent !== window) window.parent.postMessage({ type: 'modalState', open }, '*');
}

function closeRowMenus() {
  document.querySelectorAll('.row-menu.open').forEach(m => m.classList.remove('open'));
}

function saveWorkflow() {
  if (!builderSteps.length) return;
  const wfs = getStoredWorkflows();
  wfs.push({
    id: 'wf-' + Date.now().toString(36),
    name: document.getElementById('wfName').value.trim() || 'Untitled workflow',
    desc: document.getElementById('wfDesc').value.trim() || '',
    steps: [...builderSteps],
  });
  saveStoredWorkflows(wfs);
  renderList();
  closeModal();
}

/* ── Event wiring ── */
document.getElementById('newWorkflowBtn').addEventListener('click', openCreateModal);
document.getElementById('wfModalClose').addEventListener('click', closeModal);
document.getElementById('wfCancelBtn').addEventListener('click', closeModal);
document.getElementById('wfDetailClose').addEventListener('click', closeModal);
document.getElementById('wfDetailClose2').addEventListener('click', closeModal);
document.getElementById('scrim').addEventListener('click', closeModal);
document.getElementById('wfBackBtn').addEventListener('click', () => setModalStep(1));
document.getElementById('wfNextBtn').addEventListener('click', () => { applyTemplate(); setModalStep(2); });
document.getElementById('wfSaveBtn').addEventListener('click', saveWorkflow);

document.getElementById('wfSearch').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderList();
});

/* Template selection + accordion */
document.getElementById('tmplList').addEventListener('change', e => {
  if (e.target.name === 'tmpl') selectedTemplate = e.target.value;
});

document.getElementById('tmplList').addEventListener('click', e => {
  const chevron = e.target.closest('[data-expand]');
  if (!chevron) return;
  e.preventDefault();
  const id = chevron.dataset.expand;
  const acc = document.getElementById(`acc-${id}`);
  const wrap = chevron.closest('.tmpl-wrap');
  const isOpen = acc.classList.contains('open');
  document.querySelectorAll('.tmpl-accordion.open').forEach(a => a.classList.remove('open'));
  document.querySelectorAll('.tmpl-chevron-btn.open').forEach(b => b.classList.remove('open'));
  document.querySelectorAll('.tmpl-wrap.acc-open').forEach(w => w.classList.remove('acc-open'));
  if (!isOpen) {
    acc.classList.add('open');
    chevron.classList.add('open');
    wrap.classList.add('acc-open');
  }
});

/* Row clicks */
document.getElementById('wfListWrap').addEventListener('click', e => {
  const menuBtn = e.target.closest('[data-menu-for]');
  if (menuBtn) {
    e.stopPropagation();
    const menu = document.querySelector(`[data-menu-id="${menuBtn.dataset.menuFor}"]`);
    const wasOpen = menu?.classList.contains('open');
    closeRowMenus();
    if (menu && !wasOpen) menu.classList.add('open');
    return;
  }
  const delBtn = e.target.closest('[data-delete]');
  if (delBtn) {
    e.stopPropagation();
    const wfs = getStoredWorkflows().filter(w => w.id !== delBtn.dataset.delete);
    saveStoredWorkflows(wfs);
    renderList();
    return;
  }
  if (e.target.closest('.wf-row-actions')) return;
  const row = e.target.closest('.wf-row');
  if (!row) return;
  openDetail(row.dataset.wfId);
});

document.getElementById('wfListWrap').addEventListener('keydown', e => {
  if (e.key !== 'Enter' && e.key !== ' ') return;
  const row = e.target.closest('.wf-row');
  if (!row) return;
  e.preventDefault();
  openDetail(row.dataset.wfId);
});

document.addEventListener('click', e => {
  if (!e.target.closest('.wf-row-actions')) closeRowMenus();
});

/* Part list drag */
document.getElementById('wfPartList').addEventListener('dragstart', e => {
  const item = e.target.closest('.part-item');
  if (!item) return;
  draggingPartId = item.dataset.partId;
  draggingStepIdx = null;
  e.dataTransfer.effectAllowed = 'copy';
});

/* Part list click to add */
document.getElementById('wfPartList').addEventListener('click', e => {
  if (e.target.closest('.part-info-btn')) return;
  const item = e.target.closest('.part-item');
  if (!item) return;
  builderSteps.push(item.dataset.partId);
  renderCanvas();
});

/* Canvas drag */
document.getElementById('wfCanvas').addEventListener('dragstart', e => {
  const step = e.target.closest('.canvas-step-item');
  if (!step) return;
  draggingStepIdx = Number(step.dataset.stepIndex);
  draggingPartId = null;
  step.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
});
document.getElementById('wfCanvas').addEventListener('dragend', e => {
  e.target.closest('.canvas-step-item')?.classList.remove('dragging');
  draggingPartId = null;
  draggingStepIdx = null;
  document.getElementById('wfCanvas').classList.remove('drag-over');
});
document.getElementById('wfCanvas').addEventListener('dragover', e => {
  e.preventDefault();
  document.getElementById('wfCanvas').classList.add('drag-over');
});
document.getElementById('wfCanvas').addEventListener('dragleave', e => {
  if (!e.currentTarget.contains(e.relatedTarget)) e.currentTarget.classList.remove('drag-over');
});
document.getElementById('wfCanvas').addEventListener('drop', e => {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const target = e.target.closest('.canvas-step-item');
  const targetIdx = target ? Number(target.dataset.stepIndex) : builderSteps.length;
  if (draggingPartId) {
    builderSteps.splice(targetIdx, 0, draggingPartId);
  } else if (draggingStepIdx !== null) {
    const [item] = builderSteps.splice(draggingStepIdx, 1);
    builderSteps.splice(Math.min(targetIdx, builderSteps.length), 0, item);
  }
  draggingPartId = null;
  draggingStepIdx = null;
  renderCanvas();
});
document.getElementById('wfCanvas').addEventListener('click', e => {
  const btn = e.target.closest('[data-remove]');
  if (!btn) return;
  builderSteps.splice(Number(btn.dataset.remove), 1);
  renderCanvas();
});

window.addEventListener('message', e => { if (e.data?.type === 'closeModal') closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

renderList();
</script>

</body>
</html>

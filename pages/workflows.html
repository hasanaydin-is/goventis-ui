<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1200" />
  <title>Goventis — Workflows</title>

  <link rel="stylesheet" href="../styles/tokens.css" />
  <link rel="stylesheet" href="../styles/base.css" />
  <link rel="stylesheet" href="../styles/layout.css" />
  <link rel="stylesheet" href="../styles/components.css" />

  <style>
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; background: var(--surface); }
    .main { height: 100%; overflow: auto; display: flex; flex-direction: column; }

    .empty-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 40px;
    }
    .empty {
      max-width: 420px;
      text-align: center;
      display: flex; flex-direction: column; align-items: center;
      gap: 14px;
    }
    .empty-icon {
      width: 56px; height: 56px;
      border-radius: 14px;
      background: var(--accent-2);
      color: var(--accent);
      display: flex; align-items: center; justify-content: center;
    }
    .empty-icon svg { width: 26px; height: 26px; }
    .empty h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .empty p {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.55;
    }
    .empty-actions {
      display: flex; gap: 8px;
      margin-top: 4px;
    }
  </style>
</head>
<body>

<main class="main">

  <!-- Page header -->
  <div class="page-head">
    <div>
      <div class="page-title-row">
        <h1 class="page-title">Workflows</h1>
      </div>
      <div class="page-sub">Tekrar eden işleri AI agent ve adım zinciri ile otomatikleştir.</div>
    </div>
    <div class="page-actions">
      <button class="btn btn-primary" type="button">
        <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></span>
        New workflow
      </button>
    </div>
  </div>

  <!-- Empty state -->
  <div class="empty-wrap">
    <div class="empty">
      <span class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="6" cy="6" r="2"/>
          <circle cx="18" cy="6" r="2"/>
          <circle cx="12" cy="18" r="2"/>
          <path d="M8 6h8M7 8l4 8M17 8l-4 8"/>
        </svg>
      </span>
      <h2>Henüz workflow yok</h2>
      <p>Tekrar eden işlerini otomatikleştirmek için ilk workflow'unu oluştur ya da hazır şablonlardan başla.</p>
      <div class="empty-actions">
        <button class="btn" type="button">Şablonlara göz at</button>
        <button class="btn btn-primary" type="button">
          <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></span>
          New workflow
        </button>
      </div>
    </div>
  </div>

</main>

<script>
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && window.parent && window.parent !== window) {
      window.parent.postMessage({ type: 'closeIssue' }, '*');
    }
  });
</script>

</body>
</html>

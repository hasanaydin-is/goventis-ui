<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Goventis — Login</title>

  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/base.css" />

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      min-height: 100vh;
    }

    /* ── Card ── */
    .login-card {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px 44px;
      box-shadow: 0 1px 3px rgba(13,17,23,.04), 0 8px 24px rgba(13,17,23,.08);
    }

    /* ── Logo ── */
    .login-logo {
      margin-bottom: 32px;
    }

    .login-logo svg {
      display: block;
    }

    /* ── Heading ── */
    .login-heading {
      margin-bottom: 28px;
    }

    .login-heading p {
      margin: 0 0 2px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 400;
    }

    .login-heading h1 {
      margin: 0;
      font-size: 30px;
      font-weight: 500;
      letter-spacing: -0.03em;
      color: var(--fg);
      font-family: Georgia, 'Times New Roman', serif;
    }

    /* ── Google Button ── */
    .btn-google {
      width: 100%;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      color: var(--fg-2);
      cursor: pointer;
      transition: background .12s, border-color .12s;
      font-family: var(--font-sans);
    }

    .btn-google:hover {
      background: var(--hover);
      border-color: #d0d3da;
    }

    .btn-google svg {
      flex-shrink: 0;
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      font-size: 12px;
      color: var(--muted-2);
      font-weight: 400;
    }

    /* ── Form ── */
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field label {
      font-size: 13px;
      font-weight: 500;
      color: var(--fg-2);
    }

    .field input {
      height: 44px;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: var(--font-sans);
      color: var(--fg);
      background: var(--surface);
      outline: none;
      transition: border-color .12s, box-shadow .12s;
    }

    .field input::placeholder {
      color: var(--muted-2);
    }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91, 95, 240, .12);
    }

    /* ── Submit Button ── */
    .btn-submit {
      width: 100%;
      height: 44px;
      margin-top: 4px;
      background: var(--fg);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      font-family: var(--font-sans);
      cursor: pointer;
      transition: opacity .12s;
    }

    .btn-submit:hover {
      opacity: .88;
    }

    /* ── Footer ── */
    .login-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    .login-footer a {
      color: var(--muted);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .login-footer a:hover {
      color: var(--fg);
    }
  </style>
</head>
<body>

<div class="login-card">

  <!-- Logo -->
  <div class="login-logo">
    <svg width="42" height="18" viewBox="0 0 42 18" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="10" cy="9" rx="10" ry="7" fill="#0d1117"/>
      <ellipse cx="32" cy="9" rx="10" ry="7" fill="#0d1117"/>
      <rect x="19" y="7" width="4" height="2" rx="1" fill="#0d1117"/>
    </svg>
  </div>

  <!-- Heading -->
  <div class="login-heading">
    <p>Login in to</p>
    <h1>Goventis</h1>
  </div>

  <!-- Google -->
  <button class="btn-google" type="button">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M17.64 9.2045C17.64 8.5663 17.5827 7.9527 17.4764 7.3636H9V10.845H13.8436C13.635 11.97 12.9991 12.9232 12.0477 13.5613V15.8195H14.9564C16.6582 14.2527 17.64 11.9454 17.64 9.2045Z" fill="#4285F4"/>
      <path d="M9 18C11.43 18 13.4673 17.1941 14.9564 15.8195L12.0477 13.5613C11.2418 14.1013 10.2109 14.4204 9 14.4204C6.65591 14.4204 4.67182 12.8372 3.96409 10.71H0.957275V13.0418C2.43818 15.9831 5.48182 18 9 18Z" fill="#34A853"/>
      <path d="M3.96409 10.71C3.78409 10.17 3.68182 9.5932 3.68182 9C3.68182 8.4068 3.78409 7.83 3.96409 7.29V4.9582H0.957275C0.347727 6.1731 0 7.5477 0 9C0 10.4523 0.347727 11.8268 0.957275 13.0418L3.96409 10.71Z" fill="#FBBC05"/>
      <path d="M9 3.5795C10.3214 3.5795 11.5077 4.0336 12.4405 4.9255L15.0218 2.3441C13.4632 0.8918 11.4259 0 9 0C5.48182 0 2.43818 2.0168 0.957275 4.9582L3.96409 7.29C4.67182 5.1627 6.65591 3.5795 9 3.5795Z" fill="#EA4335"/>
    </svg>
    Login with Google
  </button>

  <!-- Divider -->
  <div class="divider">
    <span>or</span>
  </div>

  <!-- Email Form -->
  <form class="login-form" onsubmit="handleLogin(event)">
    <div class="field">
      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        placeholder="name@company.com"
        autocomplete="email"
        required
      />
    </div>

    <button class="btn-submit" type="submit">Continue with email</button>
  </form>

  <!-- Footer -->
  <div class="login-footer">
    By continuing, you agree to our
    <a href="#">Terms of Service</a> and
    <a href="#">Privacy Policy</a>.
  </div>

</div>

<script>
  function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    console.log('Login with:', email);
    // TODO: backend auth
  }
</script>

</body>
</html>
